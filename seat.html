<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Seat | GURUKRUPA TOURS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-4">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">
Select Your Seat
</h2>

<div class="text-center mb-3">
🚗 <b>Maruti Suzuki Ertiga (7 Seater)</b>
</div>

<!-- Driver -->

<div class="text-end mb-4">
<button class="btn btn-dark">
🛞 Driver
</button>
</div>

<!-- Seat Layout -->

<div class="seat-layout">

<button class="seat" data-seat="1">1</button>
<button class="seat" data-seat="2">2</button>

<div></div>

<button class="seat" data-seat="3">3</button>
<button class="seat" data-seat="4">4</button>

<button class="seat" data-seat="5">5</button>
<button class="seat" data-seat="6">6</button>

<div></div>

<button class="seat" data-seat="7">7</button>

</div>

<hr>

<div class="mt-3">

<p>
<b>Passengers :</b>
<span id="passengerCount"></span>
</p>

<p>
<b>Selected Seats :</b>
<span id="selectedSeats">None</span>
</p>

</div>

<button
id="bookSeatBtn"
class="btn btn-primary w-100">

Continue

</button>

</div>

</div>

<script type="module" src="js/seat.js"></script>

</body>
</html>
