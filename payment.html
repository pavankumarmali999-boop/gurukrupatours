<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | GURUKRUPA TOURS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-4">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">
Payment Summary
</h2>

<table class="table">

<tr>
<th>Route</th>
<td id="route"></td>
</tr>

<tr>
<th>Journey Date</th>
<td id="journeyDate"></td>
</tr>

<tr>
<th>Vehicle</th>
<td id="vehicle"></td>
</tr>

<tr>
<th>Seats</th>
<td id="seatNumbers"></td>
</tr>

<tr>
<th>Passengers</th>
<td id="passengerCount"></td>
</tr>

<tr>
<th>Total Fare</th>
<td><b>₹ <span id="fare"></span></b></td>
</tr>

</table>

<h4 class="mt-4 mb-3">Select Payment Method</h4>

<div class="form-check">
<input class="form-check-input" type="radio" name="payment" id="cash" value="Cash">
<label class="form-check-label" for="cash">
Cash Payment
</label>
</div>

<div class="form-check mb-4">
<input class="form-check-input" type="radio" name="payment" id="online" value="Online">
<label class="form-check-label" for="online">
Online Payment (Razorpay)
</label>
</div>

<button class="btn btn-success w-100" id="payBtn">
Proceed to Payment
</button>

</div>

</div>

<script type="module" src="js/payment.js"></script>

</body>
</html>
