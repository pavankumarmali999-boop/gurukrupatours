<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Journey | GURUKRUPA TOURS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">
🚗 GURUKRUPA TOURS
</a>
</div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">
Book Your Journey
</h2>

<div class="row">

<div class="col-md-6 mb-3">
<label>From</label>

<select id="from" class="form-select">

<option value="">Select City</option>

<option>Jaysingpur</option>

<option>Kolhapur</option>

<option>Sangli</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>To</label>

<select id="to" class="form-select">

<option value="">Select City</option>

<option>Pune</option>

<option>Mumbai</option>

<option>Satara</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Pickup Point</label>

<select id="pickup" class="form-select">

<option value="">Select Pickup</option>

<option>Bus Stand</option>

<option>Railway Station</option>

<option>Main Road</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Drop Point</label>

<select id="drop" class="form-select">

<option value="">Select Drop</option>

<option>Swargate</option>

<option>Shivajinagar</option>

<option>Hinjewadi</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Journey Date</label>

<input type="date" id="date" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Passengers</label>

<select id="passengers" class="form-select">

<option value="">Select</option>

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label>Vehicle</label>

<select id="vehicle" class="form-select">

<option value="">Select Vehicle</option>

<option>Ertiga</option>

<option>Innova</option>

<option>Tempo Traveller</option>

</select>

</div>

</div>

<button id="continueBtn" class="btn btn-primary w-100 mt-3">

Continue →

</button>

</div>

</div>

</div>

</div>

<script type="module" src="js/booking.js"></script>

</body>

</html>
