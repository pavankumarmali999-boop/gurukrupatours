<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Ticket | GURUKRUPA TOURS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container py-5">

<div class="card shadow-lg p-4">

<h2 class="text-center text-success">
🎫 Booking Confirmed
</h2>

<hr>

<table class="table">

<tr>
<th>Booking ID</th>
<td id="bookingId"></td>
</tr>

<tr>
<th>Route</th>
<td id="route"></td>
</tr>

<tr>
<th>Journey Date</th>
<td id="journeyDate"></td>
</tr>

<tr>
<th>Vehicle</th>
<td id="vehicle"></td>
</tr>

<tr>
<th>Seats</th>
<td id="seatNumbers"></td>
</tr>

<tr>
<th>Passengers</th>
<td id="passengerList"></td>
</tr>

<tr>
<th>Total Fare</th>
<td>₹ <span id="fare"></span></td>
</tr>

<tr>
<th>Payment</th>
<td id="paymentMethod"></td>
</tr>

</table>

<div class="text-center my-4">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=GURUKRUPATOURS"
alt="QR Code">

</div>

<div class="d-grid gap-2">

<button onclick="window.print()" class="btn btn-primary">
🖨️ Print Ticket
</button>

<button id="homeBtn" class="btn btn-success">
🏠 Back to Home
</button>

</div>

</div>

</div>

<script type="module" src="js/ticket.js"></script>

</body>
</html>
