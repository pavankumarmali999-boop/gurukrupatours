<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | GURUKRUPA TOURS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">
🚗 GURUKRUPA TOURS
</a>
</div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">Create Account</h2>

<div class="mb-3">
<label>Full Name</label>
<input type="text" id="fullname" class="form-control" placeholder="Enter Full Name">
</div>

<div class="mb-3">
<label>Mobile Number</label>
<input type="tel" id="mobile" class="form-control" maxlength="10" placeholder="Enter Mobile Number">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" placeholder="Enter Email">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control" placeholder="Create Password">
</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
</div>

<button id="registerBtn" class="btn btn-primary w-100">
Create Account
</button>

<hr>

<p class="text-center">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</div>

</div>

</div>

<script type="module" src="js/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
